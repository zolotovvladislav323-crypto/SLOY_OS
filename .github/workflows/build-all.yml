name: Build All Platforms

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Install MAUI
        run: dotnet workload install maui
      - name: Build Windows
        run: dotnet build SLOY.App.Unified -f net8.0-windows10.0.19041.0 -c Release

  build-android:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Install MAUI + Android
        run: dotnet workload install maui android
      - name: Restore dependencies
        run: dotnet restore
      - name: Build Android APK
        run: dotnet publish SLOY.App.Unified/SLOY.App.Unified.csproj -f net8.0-android -c Release -o ./publish/android
      - uses: actions/upload-artifact@v4
        with:
          name: sloy-os-android
          path: ./publish/android/*.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Install MAUI
        run: dotnet workload install maui ios
      - name: Build iOS
        run: dotnet build SLOY.App.Unified -f net8.0-ios -c Release

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Install MAUI
        run: dotnet workload install maui
      - name: Build macOS
        run: dotnet build SLOY.App.Unified -f net8.0-maccatalyst -c Release